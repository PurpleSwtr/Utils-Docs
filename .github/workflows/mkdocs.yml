name: Utils-Docs

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --frozen

      # - name: Formatting
      #   run: uv run ruff format --check .

      - name: Deploy Docs
        run: uv run mkdocs gh-deploy --force
